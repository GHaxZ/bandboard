services:
  bandboard:
    build: .
    image: bandboard:latest
    container_name: bandboard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      DATABASE_PATH: /app/data/sqlite.db
      UPLOAD_DIR: /app/uploads
      MIGRATE_ON_BOOT: "1"
      BAND_SECRET: ${BAND_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      BACKUP_KEEP: ${BACKUP_KEEP:-10}
    volumes:
      - bandboard_db:/app/data
      - bandboard_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+process.env.PORT+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bandboard_db:
  bandboard_uploads:
